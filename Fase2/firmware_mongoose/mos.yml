manifest_version: 2017-09-29   

author: tu
description: Firmware custom per Shelly Plug S Gen1
version: 1.0.0

libs_version: ${mos.version}
modules_version: ${mos.version}
mongoose_os_version: ${mos.version}

tags:
  - js

filesystem:
  - fs

libs:
  - origin: https://github.com/mongoose-os-libs/boards
  - origin: https://github.com/mongoose-os-libs/ca-bundle
  - origin: https://github.com/mongoose-os-libs/rpc-service-config
  - origin: https://github.com/mongoose-os-libs/rpc-service-fs
  - origin: https://github.com/mongoose-os-libs/rpc-uart
  - origin: https://github.com/mongoose-os-libs/wifi
  - origin: https://github.com/mongoose-os-libs/mqtt
  - origin: https://github.com/mongoose-os-libs/mjs
  - origin: https://github.com/mongoose-os-libs/i2c
  - origin: https://github.com/mongoose-os-libs/ota-http-client
  - origin: https://github.com/mongoose-os-libs/ota-common
  - origin: https://github.com/mongoose-os-libs/rpc-service-ota

config_schema:
  - ["mqtt.enable", true]
  - ["mqtt.server", "s", "", {title: "MQTT broker"}]
  - ["mqtt.user", "s", "", {title: "MQTT username"}]
  - ["mqtt.pass", "s", "", {title: "MQTT password"}]
  - ["i2c.enable", true]
  - ["i2c.sda_gpio", "i", 4, {title: "I2C SDA"}]
  - ["i2c.scl_gpio", "i", 5, {title: "I2C SCL"}]
  - ["i2c.freq", "i", 100000, {title: "I2C freq Hz"}]
  - ["app.relay_pin", "i", 15, {title: "Relay GPIO"}]
  - ["app.btn_pin", "i", 13, {title: "Button GPIO"}]
  - ["app.led_green_pin", "i", 0, {title: "Green LED GPIO"}]
  - ["app.led_red_pin", "i", 2, {title: "Red LED GPIO"}]
  - ["app.mqtt_topic_base", "s", "shellies/plug-s", {title: "MQTT base topic"}]
  - ["update.url", "s", "", {title: "OTA URL"}]
  - ["update.interval", "i", 3600, {title: "OTA interval sec"}]
  - ["update.enabled", "b", true, {title: "OTA abilitato"}]
  - ["update.version", "s", "1.0.0", {title: "Versione firmware"}]

build_vars:
  MGOS_ROOT_DEVTAB: ""

platforms: [esp8266]